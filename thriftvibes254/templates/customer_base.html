{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}ThriftVibes254 - Customer{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="{% static 'inventory/logo/images/back-photo.jpg' %}">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">

  {%block extra_css%} {% endblock %}
  <style>
    body {
      background-color: #f5f6fa;
    }

    .sidebar {
      width: 260px;
      min-height: 100vh;
      background: linear-gradient(180deg, #0f172a, #020617);
      color: #fff;
      box-shadow: 4px 0 20px rgba(0,0,0,.15);
    }

    .sidebar a {
      color: #cbd5e1;
      text-decoration: none;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      border-radius: 12px;
    }

    .sidebar .nav-link {
      padding: 14px 18px;
      border-radius: 12px;
      margin: 6px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all .3s ease;
    }

    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      transform: translateX(4px);
    }

    .sidebar-brand {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .content-wrapper {
      flex-grow: 1;
    }

    .card {
      border-radius: 12px;
    }

    h4, h5, h6 {
      letter-spacing: 0.3px;
    }

    /* MOBILE NAV FIX */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        z-index: 1045;
        left: -280px;
        transition: left 0.3s ease;
      }

      .sidebar.show {
        left: 0;
      }

      .content-wrapper {
        width: 100%;
      }
    }
  </style>

</head>
<body>

<div class="d-flex">

  <!-- SIDEBAR -->
  <aside class="sidebar p-3">
    <div class="mb-4 text-center">
      <div class="sidebar-brand text-white">
        ThriftVibes<span class="text-primary">254</span>
      </div>
    </div>

    <!-- MOBILE CLOSE -->
    <div class="d-flex justify-content-end d-md-none mb-2">
      <button class="btn btn-sm btn-outline-light" onclick="toggleSidebar()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <ul class="nav nav-pills flex-column">
      <li class="nav-item">
        <a href="{% url 'inventory:product_list' %}" class="nav-link {% if request.resolver_match.url_name == 'product_list' %}active{% endif %}">
          <i class="bi bi-bag me-2"></i> Products
        </a>
      </li>

      <li class="nav-item">
        <a href="#" class="nav-link" title="Coming soon">
          <i class="bi bi-receipt me-2"></i> My Orders
        </a>
      </li>

      <li class="nav-item">
        <a href="{% url 'inventory:user_profile' %}" class="nav-link {% if request.resolver_match.url_name == 'user_profile' %}active{% endif %}">
          <i class="bi bi-person me-2"></i> Profile
        </a>
      </li>

      <li class="nav-item">
        <a href="{% url 'inventory:user_settings' %}" class="nav-link {% if request.resolver_match.url_name == 'user_settings' %}active{% endif %}">
          <i class="bi bi-gear me-2"></i> Settings
        </a>
      </li>

      <li class="nav-item mt-3">
        <form method="post" action="{% url 'logout' %}" class="mt-3">
          {% csrf_token %}
          <button type="submit" class="nav-link text-danger btn btn-link p-0" style="width: 100%; text-align: left;">
            <i class="bi bi-box-arrow-right me-2"></i> Logout
          </button>
        </form>
      </li>
    </ul>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="content-wrapper">

    <!-- TOP BAR -->
    <nav class="navbar navbar-dark bg-dark shadow-sm px-3 py-3">
      <div class="d-flex align-items-center gap-3">
        <!-- MOBILE TOGGLE -->
        <button class="btn btn-outline-light d-md-none" onclick="toggleSidebar()">
          <i class="bi bi-list"></i>
        </button>

        <span class="navbar-text fw-semibold text-white">
          Welcome, {{ request.user.username }}
        </span>
      </div>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="container-fluid py-4">
      {% block content %}{% endblock %}
    </div>

  </div>

</div>

<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
<script>
  function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    sidebar.classList.toggle('show');
  }
</script>

</body>
</html>
